# ===========================================================================
#  AutoHome - layout config (example)
#  Connection (HA url + token) is set in the APP's config screen, NOT here.
#  This file only describes the layout (tabs / widgets). Values are read live.
#  Full reference: ../../../README.md
# ===========================================================================

# tabs: top tabs (max 4). style: list | grid
# types: room | toggle | button | light | number | gauge | progress | text | card | camera
# icon:    toggle|battery|gauge|list  |  emoji "💡"  |  letter+color (rooms)  |  mdi:NAME
# icon_on: second icon for the ON state (toggle); list tints green(on)/grey(off)

tabs:
  - id: rooms
    title: Rooms
    style: list
    items:
      - type: room
        title: Living room
        icon: "L"
        color: "#568CFF"
        items:
          - { type: light,  entity: light.living, title: Light }
          - { type: toggle, entity: switch.tv, title: TV, icon: "mdi:television" }
          - { type: gauge,  entity: sensor.living_temperature, title: Temperature, unit: "°C", min: 0, max: 40 }
      - type: room
        title: Cameras
        icon: "📹"
        style: grid
        items:
          - { type: camera, entity: camera.front, title: Front }
          - { type: camera, entity: camera.yard,  title: Yard }

  - id: control
    title: Control
    style: list
    items:
      # single toggle / button (entity, no items)
      - { type: toggle, entity: switch.socket, title: Socket, group: QUICK, icon: "mdi:power-plug-off", icon_on: "mdi:power-plug" }
      - { type: button, entity: scene.movie,  title: Movie, group: QUICK, icon: "mdi:movie-open" }
      # light with brightness (+/-)
      - { type: light, entity: light.kitchen, title: Kitchen, group: LIGHTS }
      # number / climate (SET + arrows; climate adds heat/cool/off)
      - { type: number, entity: climate.office, title: Thermostat, group: CLIMATE, min: 15, max: 28, step: 0.5, unit: "°C", icon: "mdi:thermostat" }
      # multi toggle panel (1-4 items, adaptive icon layout: 1 big / 2 stacked / 3-4 corners)
      - type: toggle
        title: Lights
        group: PANELS
        sep: " · "
        items:
          - { entity: light.living,  title: Living,  icon: "mdi:lightbulb-outline", icon_on: "mdi:lightbulb-on" }
          - { entity: light.kitchen, title: Kitchen, icon: "mdi:ceiling-light" }
          - { entity: switch.socket, title: Socket,  icon: "mdi:power-plug-off", icon_on: "mdi:power-plug" }
      # multi button panel (impulse actions, momentary flash)
      - type: button
        title: Gate
        group: PANELS
        items:
          - { entity: cover.gate, title: Open,  service: cover.open_cover,  icon: "mdi:garage-open" }
          - { entity: cover.gate, title: Stop,  service: cover.stop_cover,  icon: "mdi:stop" }
          - { entity: cover.gate, title: Close, service: cover.close_cover, icon: "mdi:garage" }

  - id: sensors
    title: Sensors
    style: list
    items:
      - type: progress
        entity: sensor.battery_soc
        title: Storage
        group: ENERGY
        unit: "%"
        grad: ["#D65A5A", "#E0B43C", "#36C98D"]
      - { type: gauge, entity: sensor.humidity, title: Humidity, group: SENSORS, unit: "%" }
      - type: text
        title: Inverter
        group: DATA
        sep: " · "
        lines:
          - { label: "PV1", entity: sensor.pv1_voltage }
          - { label: "PV2", entity: sensor.pv2_voltage }
          - { label: "Power", entity: sensor.power }

  - id: dashboard
    title: Dashboard
    style: grid
    items:
      - { type: card, chart: ring, entity: sensor.battery_soc, title: Storage, unit: "%" }
      - { type: card, chart: bars, entity: sensor.power, title: Power, unit: " W", hours: 6 }
      - { type: card, chart: line, entity: sensor.power, title: Power 24h, unit: " W", hours: 24 }
      - { type: card, chart: pie, title: Energy, unit: " W", parts: [
          { entity: sensor.solar_power, color: "#E0B43C" },
          { entity: sensor.grid_power,  color: "#36C98D" } ] }
      - { type: card, chart: ribbon, title: Split, parts: [
          { entity: sensor.pv1_power, label: PV1, color: "#E0B43C" },
          { entity: sensor.pv2_power, label: PV2, color: "#36C98D" } ] }
      - { type: camera, entity: camera.front, title: Front }
      # toggle/button panels also work as dashboard tiles (tap opens the player)
      - type: toggle
        title: Lights
        items:
          - { entity: light.living,  title: Living,  icon: "mdi:lightbulb-outline", icon_on: "mdi:lightbulb-on" }
          - { entity: light.kitchen, title: Kitchen, icon: "mdi:ceiling-light" }
